name: SP500 News Feed

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sp500-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Coletar noticias (24h, dedupe, impacto)
        run: node news.js

      - name: Persistir feed (keepalive p/ o cron nunca desativar)
        run: |
          LAST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          if [ $((NOW - LAST)) -gt 2160000 ]; then date > .heartbeat; fi
          git add -A
          if ! git diff --cached --quiet; then
            git config user.name "sp500-news-bot"
            git config user.email "bot@users.noreply.github.com"
            git commit -m "news: atualiza feed"
            git push
          fi
